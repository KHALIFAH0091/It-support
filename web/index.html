<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support System - GitHub + Supabase</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎫 IT Support Ticketing System</h1>
            <p>GitHub + Supabase Powered Support Portal</p>
        </header>

        <main>
            <!-- Connection Status -->
            <div id="statusMessage" class="status-message" style="display: none;"></div>

            <!-- Submit Ticket Section -->
            <section class="submit-section">
                <h2>Submit a Support Ticket</h2>
                <form id="ticketForm">
                    <div class="form-group">
                        <label for="name">Name: <span class="required">*</span></label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email: <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category: <span class="required">*</span></label>
                        <select id="category" name="category" required>
                            <option value="">Loading categories...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject: <span class="required">*</span></label>
                        <input type="text" id="subject" name="subject" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Description: <span class="required">*</span></label>
                        <textarea id="description" name="description" rows="5" required></textarea>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">Submit Ticket</button>
                </form>
            </section>

            <!-- View Tickets Section -->
            <section class="tickets-section">
                <h2>Recent Support Tickets</h2>
                <div class="filters">
                    <button class="filter-btn active" data-status="all">All</button>
                    <button class="filter-btn" data-status="open">Open</button>
                    <button class="filter-btn" data-status="closed">Closed</button>
                </div>
                <div id="ticketsContainer" class="tickets-list">
                    <p>Loading tickets...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>IT Support System • Powered by <strong>GitHub</strong> + <strong>Supabase</strong></p>
            <p><a href="https://github.com/KHALIFAH0091/It-support" target="_blank">View on GitHub</a> | 
               <a href="https://supabase.com" target="_blank">Powered by Supabase</a></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
